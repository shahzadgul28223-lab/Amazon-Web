<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Online Earning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .amazon-yellow { background-color: #febd69; }
        .amazon-dark { background-color: #131921; }
        .grab-btn { background: linear-gradient(180deg, #febd69 0%, #f3a847 100%); border-radius: 50%; width: 150px; height: 150px; border: 4px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.2); transition: 0.2s; }
        .grab-btn:active { transform: scale(0.9); }
    </style>
</head>
<body class="bg-gray-100 flex justify-center">

    <div id="app" class="w-full max-w-md min-h-screen bg-white shadow-2xl relative pb-20">
        
        <div id="auth-section" class="p-8 text-center">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" class="h-10 mx-auto mb-10">
            <h2 class="text-2xl font-bold mb-6">خوش آمدید</h2>
            <input id="email" type="email" placeholder="ای میل لکھیں" class="w-full border p-4 rounded-xl mb-4 shadow-sm outline-none focus:border-yellow-500">
            <input id="password" type="password" placeholder="پاس ورڈ" class="w-full border p-4 rounded-xl mb-6 shadow-sm outline-none focus:border-yellow-500">
            <button onclick="handleAuth()" class="w-full amazon-yellow p-4 rounded-xl font-bold text-lg shadow-md">لاگ ان / سائن اپ</button>
        </div>

        <div id="main-ui" class="hidden">
            <div class="amazon-dark p-4 text-white flex justify-between items-center">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" class="h-5 filter invert">
                <button onclick="logout()" class="text-[10px] bg-red-500 px-3 py-1 rounded-full uppercase">Logout</button>
            </div>

            <div class="amazon-yellow p-6 rounded-b-[40px] shadow-lg">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-xl">👤</div>
                    <div>
                        <p class="text-[10px] font-bold opacity-70">OFFICIAL MEMBER</p>
                        <h2 id="user-display" class="font-bold text-lg">Loading...</h2>
                    </div>
                </div>
                <div class="mt-6 grid grid-cols-2 gap-4">
                    <div class="bg-white/30 p-4 rounded-2xl backdrop-blur-md border border-white/20">
                        <p class="text-xs font-semibold text-gray-800 uppercase">Balance</p>
                        <p class="text-2xl font-black">$<span id="balance">0.00</span></p>
                    </div>
                    <div class="bg-white/30 p-4 rounded-2xl backdrop-blur-md border border-white/20">
                        <p class="text-xs font-semibold text-gray-800 uppercase">Today's Tasks</p>
                        <p class="text-2xl font-black"><span id="tasks">0</span>/10</p>
                    </div>
                </div>
            </div>

            <div class="flex flex-col items-center py-12">
                <button onclick="grabOrder()" class="grab-btn flex items-center justify-center text-white font-black text-center text-xl">
                    GRAB NOW
                </button>
                <p class="mt-6 font-bold text-gray-400 tracking-widest text-xs uppercase">Amazon Online Earning</p>
            </div>

            <div class="p-4 grid grid-cols-2 gap-3">
                <div class="bg-blue-50 p-4 rounded-2xl border-l-4 border-blue-500">
                    <p class="text-xs text-blue-600 font-bold">VIP Level 1</p>
                    <p class="text-sm font-semibold">Active Plan</p>
                </div>
                <div class="bg-orange-50 p-4 rounded-2xl border-l-4 border-orange-500 cursor-pointer">
                    <p class="text-xs text-orange-600 font-bold uppercase">Download</p>
                    <p class="text-sm font-bold">Install APK</p>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 w-full max-w-md bg-white border-t flex justify-around p-3 z-50">
            <div class="text-center text-yellow-600"><i class="fas fa-home block text-lg"></i><span class="text-[10px]">Home</span></div>
            <div class="text-center text-gray-400"><i class="fas fa-hand-holding-dollar block text-lg"></i><span class="text-[10px]">Task</span></div>
            <div class="text-center text-gray-400"><i class="fas fa-users block text-lg"></i><span class="text-[10px]">Team</span></div>
            <div class="text-center text-gray-400"><i class="fas fa-user block text-lg"></i><span class="text-[10px]">Profile</span></div>
        </div>
    </div>

    <script>
        // آپ کا فراہم کردہ Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyB1UK4JpxcM7NmmWhkyeuxqQCTKZwa1GTM",
            authDomain: "online-earning-27c0e.firebaseapp.com",
            projectId: "online-earning-27c0e",
            storageBucket: "online-earning-27c0e.firebasestorage.app",
            messagingSenderId: "113192790662",
            appId: "1:113192790662:web:b170130fee27897c517f07",
            measurementId: "G-C8CFFJY123"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        async function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || !p) return alert("Please enter email and password");
            try {
                const res = await auth.createUserWithEmailAndPassword(e, p);
                await db.collection('users').doc(res.user.uid).set({
                    balance: 0, tasks: 0, email: e, role: 'user'
                });
                alert("Account Created!");
            } catch (err) {
                try {
                    await auth.signInWithEmailAndPassword(e, p);
                } catch(loginErr) {
                    alert(loginErr.message);
                }
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('main-ui').classList.remove('hidden');
                loadData(user.uid);
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('main-ui').classList.add('hidden');
            }
        });

        async function loadData(uid) {
            db.collection('users').doc(uid).onSnapshot(doc => {
                if(doc.exists) {
                    const data = doc.data();
                    document.getElementById('balance').innerText = data.balance.toFixed(2);
                    document.getElementById('tasks').innerText = data.tasks;
                    document.getElementById('user-display').innerText = data.email.split('@')[0];
                }
            });
        }

        async function grabOrder() {
            const uid = auth.currentUser.uid;
            const docRef = db.collection('users').doc(uid);
            const doc = await docRef.get();
            const data = doc.data();

            if(data.tasks < 10) {
                alert("Searching Amazon Product...");
                setTimeout(async () => {
                    await docRef.update({
                        balance: data.balance + 0.75,
                        tasks: data.tasks + 1
                    });
                    alert("Order Grabbed! Commission: $0.75");
                }, 1000);
            } else {
                alert("Daily Task Limit Reached!");
            }
        }

        function logout() { auth.signOut(); }
    </script>
</body>
</html>
